<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Generate Password Hash</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, monospace; background: #111; color: #fff; padding: 2rem; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 2rem; max-width: 480px; width: 100%; }
  h2 { font-size: 18px; margin-bottom: 8px; color: #fff; }
  p { font-size: 13px; color: #888; margin-bottom: 1.5rem; line-height: 1.5; }
  input { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; padding: 12px; color: #fff; font-size: 15px; margin-bottom: 1rem; outline: none; }
  input:focus { border-color: #555; }
  button { width: 100%; background: #e85d2f; border: none; border-radius: 8px; padding: 12px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:hover { background: #d14d20; }
  .result { margin-top: 1.5rem; background: #111; border: 1px solid #333; border-radius: 8px; padding: 1rem; }
  .result label { font-size: 11px; color: #888; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .hash { font-size: 12px; color: #6dbb6d; word-break: break-all; line-height: 1.6; }
  .copy-btn { margin-top: 10px; background: #222; border: 1px solid #444; border-radius: 6px; padding: 6px 12px; color: #aaa; font-size: 12px; cursor: pointer; }
  .copy-btn:hover { color: #fff; }
  .step { font-size: 12px; color: #666; margin-top: 1.5rem; line-height: 1.8; }
  .step strong { color: #aaa; }
</style>
</head>
<body>
<div class="card">
  <h2>Generate Password Hash</h2>
  <p>One time use only. Enter your chosen password to generate a secure hash to store in Supabase.</p>
  
  <input type="password" id="pw" placeholder="Enter your password" />
  <button onclick="generate()">Generate Hash</button>

  <div class="result" id="result" style="display:none">
    <label>Your password hash — copy this into Supabase</label>
    <div class="hash" id="hashOutput"></div>
    <button class="copy-btn" onclick="copyHash()">Copy hash</button>
  </div>

  <div class="step">
    <strong>After generating:</strong><br>
    1. Copy the hash above<br>
    2. Go to Supabase → Table Editor → app_user<br>
    3. Insert a new row with your email + this hash<br>
    4. Delete this file — you won't need it again
  </div>
</div>

<script>
async function generate() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  const encoder = new TextEncoder();
  const data = encoder.encode(pw);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  document.getElementById('hashOutput').textContent = hashHex;
  document.getElementById('result').style.display = 'block';
}

function copyHash() {
  const hash = document.getElementById('hashOutput').textContent;
  navigator.clipboard.writeText(hash);
  document.querySelector('.copy-btn').textContent = 'Copied!';
  setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copy hash', 2000);
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
